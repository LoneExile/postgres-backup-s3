# Daily PostgreSQL backup to S3 as a Kubernetes CronJob.
# Replace the Secret values (or source them from your DB operator, e.g. a
# CloudNativePG "<cluster>-app" secret) and apply with `kubectl apply -f`.
apiVersion: v1
kind: Secret
metadata:
  name: pg-backup-s3
type: Opaque
stringData:
  PGPASSWORD: "secret"
  S3_ACCESS_KEY: "AKIA..."
  S3_SECRET_KEY: "..."
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile: {type: RuntimeDefault}
          containers:
            - name: pg-backup
              image: ghcr.io/loneexile/postgres-backup-s3:latest
              imagePullPolicy: Always
              env:
                - {name: PGHOST, value: "mydb-rw"}
                - {name: PGUSER, value: "postgres"}
                - {name: PGDATABASE, value: "postgres"}
                # DATABASES empty => back up every database on the server.
                - {name: DATABASES, value: ""}
                - {name: S3_ENDPOINT, value: "https://s3.amazonaws.com"}
                - {name: S3_BUCKET, value: "pg-backups"}
                - {name: S3_PREFIX, value: "mydb"}
                - {name: KEEP_DAYS, value: "7"}
                # Optional Prometheus Pushgateway:
                # - {name: PUSHGATEWAY_URL, value: "http://pushgateway.monitoring:9091"}
                - {name: PGPASSWORD,    valueFrom: {secretKeyRef: {name: pg-backup-s3, key: PGPASSWORD}}}
                - {name: S3_ACCESS_KEY, valueFrom: {secretKeyRef: {name: pg-backup-s3, key: S3_ACCESS_KEY}}}
                - {name: S3_SECRET_KEY, valueFrom: {secretKeyRef: {name: pg-backup-s3, key: S3_SECRET_KEY}}}
              resources:
                requests: {cpu: "50m", memory: "256Mi"}
                limits: {memory: "1Gi"}
